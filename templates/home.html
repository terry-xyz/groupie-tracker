<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupie Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
        <h1>Groupie Tracker</h1>
    </header>
    <main>
        <div class="filters">
            <!-- Search with autocomplete -->
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search artists, members, locations, dates..." autocomplete="off">
                <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
            </div>

            <div class="filter-group">
                <label>Creation Year:</label>
                <input type="number" id="minYear" placeholder="Min" min="1900" max="2030">
                <input type="number" id="maxYear" placeholder="Max" min="1900" max="2030">
            </div>

            <div class="filter-group">
                <label>First Album Year:</label>
                <input type="number" id="minAlbumYear" placeholder="Min" min="1900" max="2030">
                <input type="number" id="maxAlbumYear" placeholder="Max" min="1900" max="2030">
            </div>

            <div class="filter-group">
                <label>Sort By:</label>
                <select id="sortBy">
                    <option value="">Default</option>
                    <option value="name">Name (A-Z)</option>
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                </select>
            </div>

            <!-- Member count slider -->
            <div class="filter-group slider-group">
                <label>Members: <span id="memberRangeLabel">1 - 8+</span></label>
                <div class="slider-container">
                    <input type="range" id="minMembers" min="1" max="8" value="1" step="1">
                    <input type="range" id="maxMembers" min="1" max="8" value="8" step="1">
                </div>
            </div>

            <!-- Location checkboxes (populated via JS) -->
            <div class="filter-group checkbox-group locations-filter">
                <label>Locations:</label>
                <input type="text" id="locationSearch" class="location-search" placeholder="Filter locations...">
                <div class="checkbox-list scrollable" id="locationCheckboxes">
                    <p class="loading-text">Loading locations...</p>
                </div>
            </div>

            <div class="filter-actions">
                <button id="resetFilters" class="btn">Reset Filters</button>
            </div>
        </div>

        <p id="resultCount" class="result-count"></p>

        <div class="artist-grid" id="artistGrid">
            {{range .}}
            <div class="artist-card">
                <img src="{{.Image}}" alt="{{.Name}}">
                <h2>{{.Name}}</h2>
                <p>Created: {{.CreationDate}}</p>
                <p>First Album: {{.FirstAlbum}}</p>
                <a href="/artist/{{.ID}}" class="btn">View Details</a>
            </div>
            {{end}}
        </div>
    </main>
    <script src="/static/script.js"></script>
</body>
</html>
